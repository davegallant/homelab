name: Run all playbooks
on:
  push:
    branches:
      - main
  schedule:
    - cron: "@daily"

jobs:
  discover:
    runs-on: host
    outputs:
      playbooks: ${{ steps.list.outputs.playbooks }}
    steps:
      - uses: https://code.forgejo.org/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - id: list
        run: |
          playbooks=$(find ansible/playbooks -name "main.yml" -mindepth 2 -maxdepth 2 \
            | xargs -I{} dirname {} | xargs -I{} basename {} \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "playbooks=$playbooks" >> $FORGEJO_OUTPUT

  run-ansible:
    needs: discover
    if: ${{ github.event.inputs.host == '' }}
    runs-on: host
    strategy:
      matrix:
        playbook: ${{ fromJson(needs.discover.outputs.playbooks) }}
      fail-fast: false
    steps:
      - name: Check out repository code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Run playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: False
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
          ANSIBLE_PYTHON_INTERPRETER: /usr/bin/python3.12
        run: |
          echo "$ANSIBLE_VAULT_PASSWORD" > .vault_pass
          ansible-playbook -i ansible/inventory ansible/playbooks/${{ matrix.playbook }}/main.yml --vault-password-file .vault_pass

  notify-failure:
    needs: run-ansible
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Send failure notification
        run: |
          curl -X POST "${{ secrets.GOTIFY_URL }}/message?token=${{ secrets.GOTIFY_TOKEN }}" \
            -F "title=Ansible playbooks failed in ${{ github.repository }}!" \
            -F "message=One or more playbooks failed. Check workflow details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_number }}" \
            -F "priority=5"

services:
  paperless-redis:
    image: docker.io/library/redis:8@sha256:1f073813b641755b70b0200da64131bbeeb4ec5b633ca67772229b49820caafa
    container_name: paperless-redis
    restart: unless-stopped
    networks:
      - paperless
    volumes:
      - ./redis-data:/data
  paperless-ngx:
    image: docker.io/paperlessngx/paperless-ngx:2.20.15@sha256:6c86cad803970ea782683a8e80e7403444c5bf3cf70de63b4d3c8e87500db92f
    container_name: paperless-ngx
    restart: always
    networks:
      - paperless
    environment:
      - PAPERLESS_SECRET_KEY={{ paperless_secret_key }}
      - PAPERLESS_ADMIN_USER={{ paperless_admin_user }}
      - PAPERLESS_ADMIN_PASSWORD={{ paperless_admin_password }}
      - PAPERLESS_URL={{ paperless_url }}
      - PAPERLESS_TIME_ZONE=UTC
      - PAPERLESS_DBENGINE=postgresql
      - POSTGRES_DB=paperless
      - POSTGRES_USER={{ paperless_db_user }}
      - POSTGRES_PASSWORD={{ paperless_db_password }}
      - POSTGRES_HOST=paperless-db
      - PAPERLESS_REDIS=redis://paperless-redis:6379
    volumes:
      - ./data:/usr/src/paperless/data
      - ./consume:/usr/src/paperless/consume
      - ./media:/usr/src/paperless/media
      - ./export:/usr/src/paperless/export
    depends_on:
      - paperless-db
    healthcheck:
      test: ["CMD", "curl", "-fs", "-o", "/dev/null", "-w", "%{http_code}", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  paperless-db:
    image: docker.io/postgres:18.3@sha256:78481659c47e862334611ccdaf7c369c986b3046da9857112f3b309114a65fb4
    container_name: paperless-db
    restart: always
    networks:
      - paperless
    environment:
      - POSTGRES_DB=paperless
      - POSTGRES_USER={{ paperless_db_user }}
      - POSTGRES_PASSWORD={{ paperless_db_password }}
    volumes:
      - ./pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]

  newt:
    image: docker.io/fosrl/newt:1.11.0@sha256:ea9e2bc53850d4a8b2c6019d97172a2b3e3cb1a15412babb4a0f4adc522f4a79
    container_name: newt-paperless
    restart: unless-stopped
    networks:
      - paperless
    environment:
      - PANGOLIN_ENDPOINT={{ pangolin_endpoint }}
      - NEWT_ID={{ paperless_newt_id }}
      - NEWT_SECRET={{ paperless_newt_secret }}

networks:
  paperless:
    name: paperless

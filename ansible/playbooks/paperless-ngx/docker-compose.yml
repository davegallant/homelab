services:
  paperless-redis:
    image: docker.io/library/redis:8@sha256:009cc37796fbdbe1b631b4cc0582bed167e5e403ed8bcd06f77eb6cb5aeb6f93
    container_name: paperless-redis
    restart: unless-stopped
    networks:
      - paperless
    volumes:
      - ./redis-data:/data
  paperless-ngx:
    image: docker.io/paperlessngx/paperless-ngx:2.20.13@sha256:4b05bcd28e6923768000b5d247cbf2c66fd49bdc3f3b05955bd4f6790a638b01
    container_name: paperless-ngx
    restart: always
    networks:
      - paperless
    environment:
      - PAPERLESS_SECRET_KEY={{ paperless_secret_key }}
      - PAPERLESS_ADMIN_USER={{ paperless_admin_user }}
      - PAPERLESS_ADMIN_PASSWORD={{ paperless_admin_password }}
      - PAPERLESS_URL={{ paperless_url }}
      - PAPERLESS_TIME_ZONE=UTC
      - PAPERLESS_DBENGINE=postgresql
      - POSTGRES_DB=paperless
      - POSTGRES_USER={{ paperless_db_user }}
      - POSTGRES_PASSWORD={{ paperless_db_password }}
      - POSTGRES_HOST=paperless-db
      - PAPERLESS_REDIS=redis://paperless-redis:6379
    volumes:
      - ./data:/data
      - ./consume:/consume
      - ./media:/media
      - ./export:/export
    depends_on:
      - paperless-db
    healthcheck:
      test: ["CMD", "curl", "-fs", "-o", "/dev/null", "-w", "%{http_code}", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  paperless-db:
    image: docker.io/postgres:15.17@sha256:c635fa3e3b7421a659d34abdfd6d492f679cbe8149e261a501237b55c5a94212
    container_name: paperless-db
    restart: always
    networks:
      - paperless
    environment:
      - POSTGRES_DB=paperless
      - POSTGRES_USER={{ paperless_db_user }}
      - POSTGRES_PASSWORD={{ paperless_db_password }}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]

  newt:
    image: docker.io/fosrl/newt:1.11.0@sha256:ea9e2bc53850d4a8b2c6019d97172a2b3e3cb1a15412babb4a0f4adc522f4a79
    container_name: newt-paperless
    restart: unless-stopped
    networks:
      - paperless
    environment:
      - PANGOLIN_ENDPOINT={{ pangolin_endpoint }}
      - NEWT_ID={{ paperless_newt_id }}
      - NEWT_SECRET={{ paperless_newt_secret }}

networks:
  paperless:
    name: paperless

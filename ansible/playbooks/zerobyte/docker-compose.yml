services:
  zerobyte:
    image: ghcr.io/nicotsx/zerobyte:v0.37@sha256:092f390e8679bdfc371bce18665f88a999830f95d090eb12bace67900ee216b1
    container_name: zerobyte
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    ports:
      - "4096:4096"
    devices:
      - /dev/fuse:/dev/fuse
    environment:
      - TZ=America/Toronto
      - BASE_URL={{ zerobyte_base_url }}
      - APP_SECRET={{ zerobyte_app_secret }}
      - WEBHOOK_ALLOWED_ORIGINS= {{ zerobyte_webhook_allowed_origins }}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/lib/zerobyte:/var/lib/zerobyte
      - /mnt:/mnt:ro
      - ~/.config/rclone:/root/.config/rclone:rw

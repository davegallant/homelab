services:
  zerobyte:
    image: ghcr.io/nicotsx/zerobyte:v0.39@sha256:b78c7439a41c46f9d31bbee7f307909d555b58d3f74a9e4cde3e54532e95407d
    container_name: zerobyte
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    ports:
      - "4096:4096"
    devices:
      - /dev/fuse:/dev/fuse
    environment:
      - TZ=America/Toronto
      - BASE_URL={{ zerobyte_base_url }}
      - APP_SECRET={{ zerobyte_app_secret }}
      - WEBHOOK_ALLOWED_ORIGINS= {{ zerobyte_webhook_allowed_origins }}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/lib/zerobyte:/var/lib/zerobyte
      - /mnt:/mnt:ro
      - ~/.config/rclone:/root/.config/rclone:rw

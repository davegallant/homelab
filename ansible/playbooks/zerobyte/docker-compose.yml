services:
  zerobyte:
    image: ghcr.io/nicotsx/zerobyte:v0.36@sha256:1bf6a7770d468c02f55e3655bb4d7e9a8da0291cdd8479f815faa6c1126bc14d
    container_name: zerobyte
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    ports:
      - "4096:4096"
    devices:
      - /dev/fuse:/dev/fuse
    environment:
      - TZ=America/Toronto
      - BASE_URL={{ zerobyte_base_url }}
      - APP_SECRET={{ zerobyte_app_secret }}
      - WEBHOOK_ALLOWED_ORIGINS= {{ zerobyte_webhook_allowed_origins }}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/lib/zerobyte:/var/lib/zerobyte
      - /mnt:/mnt:ro
      - ~/.config/rclone:/root/.config/rclone:rw

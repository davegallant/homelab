services:
  navidrome:
    container_name: navidrome
    image: docker.io/deluan/navidrome:0.63.1@sha256:7c43af9f651654e97278be871705aae85a4ee0fa4b310337989699a8ada9b3ed
    user: 1000:1000 # should be owner of volumes
    networks:
      - navidrome
    restart: always
    environment:
      - ND_ENABLEINSIGHTSCOLLECTOR=false
      - ND_LASTFM_APIKEY={{ navidrome_lastfm_api_key }}
      - ND_LASTFM_SECRET={{ navidrome_lastfm_api_key }}
      - ND_LISTENBRAINZ_BASEURL=https://maloja.snake-cloud.ts.net/apis/listenbrainz/1/
      - ND_AUTOIMPORTPLAYLISTS=false
    volumes:
      - ./data:/data
      - /music:/music:ro
  newt:
    image: docker.io/fosrl/newt:1.14.0@sha256:60c78391e3b5cb8a260490fb26b8b7329ed5448077629da89a564af80d3a9fad
    container_name: newt-navidrome
    restart: unless-stopped
    networks:
      - navidrome
    environment:
      - PANGOLIN_ENDPOINT={{ pangolin_endpoint }}
      - NEWT_ID={{ navidrome_newt_id }}
      - NEWT_SECRET={{ navidrome_newt_secret }}
networks:
  navidrome:
    name: navidrome

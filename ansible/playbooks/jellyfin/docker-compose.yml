services:
  jellyfin:
    image: docker.io/jellyfin/jellyfin:10.11.11@sha256:aefb67e6a7ff1debdd154a78a7bbb780fd0c873d8639210a7f6a2016ad2b35db
    container_name: jellyfin
    user: 1000:1000
    networks:
      - jellyfin
    group_add:
      - "108"
    environment:
      - JELLYFIN_PublishedServerUrl={{ jellyfin_hostname }}
    volumes:
      - ./config:/config
      - /mnt:/mnt:ro
    restart: always
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
  newt:
    image: docker.io/fosrl/newt:1.14.0@sha256:60c78391e3b5cb8a260490fb26b8b7329ed5448077629da89a564af80d3a9fad
    container_name: newt-jellyfin
    restart: unless-stopped
    networks:
      - jellyfin
    environment:
      - PANGOLIN_ENDPOINT={{ pangolin_endpoint }}
      - NEWT_ID={{ jellyfin_newt_id }}
      - NEWT_SECRET={{ jellyfin_newt_secret }}
networks:
  jellyfin:
    name: jellyfin

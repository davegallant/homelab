---
- name: Install cinema
  hosts: cinema
  tasks:
    - ansible.builtin.include_tasks:
        file: ../../tasks/install-common-packages.yml

    - name: Install packages
      ansible.builtin.apt:
        name:
          - mergerfs
          - nfs-kernel-server
          - samba
        state: present
        update_cache: true

    - ansible.builtin.include_tasks:
        file: ../../tasks/install-alloy.yml

    - name: Configure Alloy
      ansible.builtin.copy:
        dest: /etc/alloy/config.alloy
        content: |
          loki.relabel "journal" {
            forward_to = []

            rule {
              target_label  = "host"
              replacement   = constants.hostname
            }

            rule {
              source_labels = ["__journal__systemd_unit"]
              target_label  = "unit"
            }
          }

          loki.source.journal "read" {
            forward_to    = [loki.write.endpoint.receiver]
            relabel_rules = loki.relabel.journal.rules
            labels        = {component = "loki.source.journal"}
          }

          loki.write "endpoint" {
            endpoint {
              url = "{{ loki_url }}"
            }
          }
        mode: "0644"
        backup: true

    - name: Restart alloy to apply config
      ansible.builtin.systemd_service:
        name: alloy
        state: restarted

    - name: Allow NFS port
      community.general.ufw:
        rule: allow
        port: "2049"
        proto: tcp

    - name: Allow SMB port from LAN
      community.general.ufw:
        rule: allow
        port: "445"
        proto: tcp
        from_ip: 192.168.1.0/24

    - name: Allow SMB port from Tailscale
      community.general.ufw:
        rule: allow
        port: "445"
        proto: tcp
        from_ip: 100.64.0.0/10

    - name: Enable UFW
      community.general.ufw:
        state: enabled
        policy: deny

    - name: Create /mnt/wdred1 mount point
      ansible.builtin.file:
        path: /mnt/wdred1
        state: directory
        mode: "0755"

    - name: Create /mnt/wdred2 mount point
      ansible.builtin.file:
        path: /mnt/wdred2
        state: directory
        mode: "0755"

    - name: Mount wdred1
      ansible.posix.mount:
        path: /mnt/wdred1
        src: LABEL=wdred1
        fstype: ext4
        opts: defaults,nofail
        state: mounted

    - name: Mount wdred2
      ansible.posix.mount:
        path: /mnt/wdred2
        src: LABEL=wdred2
        fstype: ext4
        opts: defaults,nofail
        state: mounted

    - name: Create /mnt/pool mount point
      ansible.builtin.file:
        path: /mnt/pool
        state: directory
        mode: "0755"

    - name: Mount mergerfs pool
      ansible.posix.mount:
        path: /mnt/pool
        src: /mnt/wdred1:/mnt/wdred2
        fstype: fuse.mergerfs
        opts: defaults,nonempty,allow_other,use_ino,cache.files=off,moveonenospc=true,category.create=mfs,dropcacheonclose=true,minfreespace=250G,inodecalc=path-hash,func.getattr=newest,fsname=mergerfs
        state: present

    - name: Create Samba user
      ansible.builtin.user:
        name: "{{ cinema_samba_username }}"
        system: true
        shell: /usr/sbin/nologin
        create_home: false

    - name: Configure Samba password
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          if pdbedit -L -u "{{ cinema_samba_username }}" >/dev/null 2>&1; then
            printf '%s\n%s\n' "{{ cinema_samba_password }}" "{{ cinema_samba_password }}" | smbpasswd -s "{{ cinema_samba_username }}"
          else
            printf '%s\n%s\n' "{{ cinema_samba_password }}" "{{ cinema_samba_password }}" | smbpasswd -s -a "{{ cinema_samba_username }}"
          fi
        executable: /usr/bin/bash
      changed_when: true
      no_log: true

    - name: Deploy /etc/samba/smb.conf
      ansible.builtin.template:
        src: smb.conf.j2
        dest: /etc/samba/smb.conf
        mode: "0644"
      notify: restart smbd

    - name: Enable and start smbd
      ansible.builtin.systemd_service:
        name: smbd
        enabled: true
        state: started

    - name: Enable and start nfs-server
      ansible.builtin.systemd_service:
        name: nfs-server
        enabled: true
        state: started

    - name: Deploy /etc/exports
      ansible.builtin.template:
        src: exports.j2
        dest: /etc/exports
        mode: "0644"
      notify: reload exports

  handlers:
    - name: reload exports
      ansible.builtin.command:
        cmd: exportfs -ra

    - name: restart smbd
      ansible.builtin.systemd_service:
        name: smbd
        state: restarted

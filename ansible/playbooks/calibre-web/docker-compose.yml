services:
  calibre-web:
    image: docker.io/linuxserver/calibre-web:0.6.26@sha256:604044baccb002db9dafc477f0426e5b2982d67efaa24216731b064a022cebb0
    container_name: calibre-web
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - DOCKER_MODS=linuxserver/mods:universal-calibre #optional
    volumes:
      - ./config:/config
      - /mnt/media/Calibre:/books
    ports:
      - 8083:8083
    restart: always

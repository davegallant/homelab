services:
  calibre-web:
    image: docker.io/linuxserver/calibre-web:0.6.26@sha256:476c9b6c5bc3ed73c8caabc26820abd38838a40fcc1dc4093d474f9e5a207f4b
    container_name: calibre-web
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - DOCKER_MODS=linuxserver/mods:universal-calibre #optional
    volumes:
      - ./config:/config
      - /mnt/media/Calibre:/books
    ports:
      - 8083:8083
    restart: always

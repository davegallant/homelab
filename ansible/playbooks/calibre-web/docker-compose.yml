services:
  calibre-web:
    image: docker.io/linuxserver/calibre-web:0.6.26@sha256:623a616cbbdf91094ebb6597ef438af56870ef547890282f7112075aff179f59
    container_name: calibre-web
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - DOCKER_MODS=linuxserver/mods:universal-calibre #optional
    volumes:
      - ./config:/config
      - /mnt/media/Calibre:/books
    ports:
      - 8083:8083
    restart: always

services:
  calibre-web:
    image: docker.io/linuxserver/calibre-web:0.6.26@sha256:c1b0068188fd9bb5237988623a8a930401384b183e073e193ef8ec1e136aef8d
    container_name: calibre-web
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - DOCKER_MODS=linuxserver/mods:universal-calibre #optional
    volumes:
      - ./config:/config
      - /mnt/media/Calibre:/books
    ports:
      - 8083:8083
    restart: always

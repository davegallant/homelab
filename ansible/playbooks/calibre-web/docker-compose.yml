services:
  calibre-web:
    image: docker.io/linuxserver/calibre-web:0.6.26@sha256:2cf8a3c5ea045b570f4075c2495af90c71d9148e38b586f4b48ed1be6e19a785
    container_name: calibre-web
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - DOCKER_MODS=linuxserver/mods:universal-calibre #optional
    volumes:
      - ./config:/config
      - /mnt/media/Calibre:/books
    ports:
      - 8083:8083
    restart: always

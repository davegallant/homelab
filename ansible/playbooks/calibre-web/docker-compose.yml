services:
  calibre-web:
    image: docker.io/linuxserver/calibre-web:0.6.26@sha256:204e20768d5d94cdb27d89958c520714e2c7b2850293c9d9e8f6340662bcc102
    container_name: calibre-web
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - DOCKER_MODS=linuxserver/mods:universal-calibre #optional
    volumes:
      - ./config:/config
      - /mnt/media/Calibre:/books
    ports:
      - 8083:8083
    restart: always

services:
  calibre-web:
    image: docker.io/linuxserver/calibre-web:0.6.26@sha256:561456bd634893293f7038cf24e1297d7fad0c7268682fa36036f400d8ff3760
    container_name: calibre-web
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - DOCKER_MODS=linuxserver/mods:universal-calibre #optional
    volumes:
      - ./config:/config
      - /mnt/media/Calibre:/books
    ports:
      - 8083:8083
    restart: always

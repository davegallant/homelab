services:
  calibre-web:
    image: docker.io/linuxserver/calibre-web:0.6.26@sha256:6cf7dab48a4ae0ed3304a94670aa173a4e6b9714824ab6199dddaae3518e618d
    container_name: calibre-web
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - DOCKER_MODS=linuxserver/mods:universal-calibre #optional
    volumes:
      - ./config:/config
      - /mnt/media/Calibre:/books
    ports:
      - 8083:8083
    restart: always

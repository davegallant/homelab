---
- name: Install gatus
  hosts: gatus
  tasks:
    - ansible.builtin.include_tasks:
        file: ../../tasks/install-docker.yml

    - ansible.builtin.include_tasks:
        file: ../../tasks/install-common-packages.yml

    - ansible.builtin.include_tasks:
        file: ../../tasks/install-alloy.yml

    - ansible.builtin.include_tasks:
        file: ../../tasks/install-beszel-agent.yml

    - name: Create gatus config directory
      ansible.builtin.file:
        path: "~/config"
        state: directory
        mode: "0750"
        owner: "999"
        group: "999"

    - name: Create gatus data directory
      ansible.builtin.file:
        path: "~/data"
        state: directory
        mode: "0750"
        owner: "999"
        group: "999"

    - name: Copy docker-compose.yml
      ansible.builtin.template:
        src: docker-compose.yml
        dest: "~/docker-compose.yml"
        mode: "0640"

    - name: Copy config.yaml
      ansible.builtin.template:
        src: config/config.yaml
        dest: "~/config/config.yaml"
        mode: "0640"
        owner: "999"
        group: "999"

    - name: Enable UFW
      community.general.ufw:
        state: enabled
        policy: deny

    - ansible.builtin.include_tasks:
        file: ../../tasks/docker-compose-up.yml

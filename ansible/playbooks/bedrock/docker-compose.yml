services:
  bedrock:
    image: docker.io/itzg/minecraft-bedrock-server:2026.4.1@sha256:66fbfc7c9c170b460e76fc556719cf377ba66c5112002fece9b7524d981db822
    container_name: bedrock
    environment:
      EULA: "TRUE"
      LEVEL_NAME: "Bedrock level"
    ports:
      - "19132:19132/udp"
    volumes:
      - ./data:/data
    stdin_open: true
    tty: true
    restart: always

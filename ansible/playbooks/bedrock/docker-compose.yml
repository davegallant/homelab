services:
  bedrock:
    image: docker.io/itzg/minecraft-bedrock-server:2026.4.4@sha256:9404afa3b495dab4c98c11475b737953ae880a7ccfd5ea2c7b4935acafd67395
    container_name: bedrock
    environment:
      EULA: "TRUE"
      LEVEL_NAME: "Bedrock level"
    ports:
      - "19132:19132/udp"
    volumes:
      - ./data:/data
    stdin_open: true
    tty: true
    restart: always

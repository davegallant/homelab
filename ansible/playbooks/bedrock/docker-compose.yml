services:
  bedrock:
    image: docker.io/itzg/minecraft-bedrock-server:2026.5.1@sha256:8482f0fccfc09555326bd2f88cf4571b1346e623955752044f7613df8ce90f2b
    container_name: bedrock
    environment:
      EULA: "TRUE"
      LEVEL_NAME: "Bedrock level"
    ports:
      - "19132:19132/udp"
    volumes:
      - ./data:/data
    stdin_open: true
    tty: true
    restart: always

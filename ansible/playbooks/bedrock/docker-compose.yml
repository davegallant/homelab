services:
  bedrock:
    image: docker.io/itzg/minecraft-bedrock-server:2026.5.0@sha256:cd6271eb14fa1dfe539223758bbe58445832727e0937832dd9460429dc8945e0
    container_name: bedrock
    environment:
      EULA: "TRUE"
      LEVEL_NAME: "Bedrock level"
    ports:
      - "19132:19132/udp"
    volumes:
      - ./data:/data
    stdin_open: true
    tty: true
    restart: always

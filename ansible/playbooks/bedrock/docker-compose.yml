services:
  bedrock:
    image: docker.io/itzg/minecraft-bedrock-server:2026.6.2@sha256:8e045b7b3a4d43ad70459356874a262fd63e2f2ce82d5b0c9e5e956233e9d771
    container_name: bedrock
    environment:
      EULA: "TRUE"
      LEVEL_NAME: "Bedrock level"
    ports:
      - "19132:19132/udp"
    volumes:
      - ./data:/data
    stdin_open: true
    tty: true
    restart: always

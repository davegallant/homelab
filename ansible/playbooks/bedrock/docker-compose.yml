services:
  bedrock:
    image: docker.io/itzg/minecraft-bedrock-server:2026.4.0@sha256:46618f0bebd8f451b65d93a9ed415108168d619de443c820190de20981ab7436
    container_name: bedrock
    environment:
      EULA: "TRUE"
      LEVEL_NAME: "Bedrock level"
    ports:
      - "19132:19132/udp"
    volumes:
      - ./data:/data
    stdin_open: true
    tty: true
    restart: always

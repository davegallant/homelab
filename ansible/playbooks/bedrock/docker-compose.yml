services:
  bedrock:
    image: docker.io/itzg/minecraft-bedrock-server:2026.5.2@sha256:ddf6c6644c1b28a7989869054582478c3ad8a3c3c2c6839b1767141ebcefabd8
    container_name: bedrock
    environment:
      EULA: "TRUE"
      LEVEL_NAME: "Bedrock level"
    ports:
      - "19132:19132/udp"
    volumes:
      - ./data:/data
    stdin_open: true
    tty: true
    restart: always

services:
  qbittorrent:
    image: docker.io/linuxserver/qbittorrent:5.2.2@sha256:bca2cf536c00900f0b8fb62ca3dcbed8ee64293165d41c8240d2cc952d4ef048
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - WEBUI_PORT=8080
      - DOCKER_MODS=ghcr.io/themepark-dev/theme.park:qbittorrent
      - QBITTORRENT_VERSION=5.2.2
      - TP_COMMUNITY_THEME=true
      - TP_THEME=catppuccin-frappe
    volumes:
      - ~:/config
      - /mnt:/mnt
      - ~/scripts:/scripts
    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp
    restart: always

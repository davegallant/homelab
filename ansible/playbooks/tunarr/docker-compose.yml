services:
  tunarr:
    container_name: tunarr
    image: docker.io/chrisbenincasa/tunarr:1.2.15@sha256:4d2e4960c31908d13df1495bc445375a5786fe6f833ea7a251d4b277be598642
    restart: always
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
    ports:
      - 8000:8000
    environment:
      - TZ=America/New_York
      - TUNARR_SERVER_TRUST_PROXY=true
    volumes:
      - ./tunarr-data:/config/tunarr

services:
  tunarr:
    container_name: tunarr
    image: docker.io/chrisbenincasa/tunarr:1.2.17@sha256:5ec36d252e8c1f403405388c578374e3713a5c7a3a5db2813379e772aca28a37
    restart: always
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
    ports:
      - 8000:8000
    environment:
      - TZ=America/New_York
      - TUNARR_SERVER_TRUST_PROXY=true
    volumes:
      - ./tunarr-data:/config/tunarr

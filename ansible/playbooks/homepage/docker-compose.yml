services:
  homepage:
    image: ghcr.io/gethomepage/homepage:v1.12.3@sha256:cc84f2f5eb3c7734353701ccbaa24ed02dacb0d119114e50e4251e2005f3990a
    container_name: homepage
    environment:
      PUID: 1000
      PGID: 1000
      HOMEPAGE_ALLOWED_HOSTS: homepage.snake-cloud.ts.net
    ports:
      - 3000:3000
    volumes:
      - ./config:/app/config
      - ./config/images:/app/public/images
      - ./config/icons:/app/public/icons
    restart: always

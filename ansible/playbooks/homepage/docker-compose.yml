services:
  homepage:
    image: ghcr.io/gethomepage/homepage:v1.13.0@sha256:690ac1f79e33000c176c2a28229ed00b49b44781e8a63f280a8ece22c161f099
    container_name: homepage
    environment:
      PUID: 1000
      PGID: 1000
      HOMEPAGE_ALLOWED_HOSTS: homepage.snake-cloud.ts.net
    ports:
      - 3000:3000
    volumes:
      - ./config:/app/config
      - ./config/images:/app/public/images
      - ./config/icons:/app/public/icons
    restart: always

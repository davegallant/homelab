
services:
  lidarr:
    container_name: lidarr
    image: docker.io/linuxserver/lidarr:3.1.0@sha256:a11272d4ff510a3665e37e11573c7f4ed134ba8089e54baf4c4f916d2e87febc
    ports:
      - 8686:8686
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
      - TZ=Etc/UTC
    volumes:
      - ~/lidarr/config:/config
      - /mnt/media/Music:/mnt/media/Music
      - /mnt/media/Torrents:/downloads
    restart: always

services:
  lidarr:
    container_name: lidarr
    image: docker.io/linuxserver/lidarr:3.1.0@sha256:7f34e2a907c7bcfc5cd49a1685db21a1e5055c96e8ad5e0d77ee94e1d50d84e5
    ports:
      - 8686:8686
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
      - TZ=Etc/UTC
    volumes:
      - ~/lidarr/config:/config
      - /mnt/media/Music:/mnt/media/Music
      - /mnt/media/torrents:/downloads
    restart: always

services:
  bentopdf:
    image: ghcr.io/alam00000/bentopdf:2.8.4@sha256:f54b9ed9c56b767e0098b525468206689b666323c2b500b9686c3cf41cdfa348
    container_name: bentopdf
    restart: always
    networks:
      - bentopdf
  newt:
    image: docker.io/fosrl/newt:1.11.0@sha256:ea9e2bc53850d4a8b2c6019d97172a2b3e3cb1a15412babb4a0f4adc522f4a79
    container_name: newt-bentopdf
    restart: unless-stopped
    networks:
      - bentopdf
    environment:
      - PANGOLIN_ENDPOINT={{ pangolin_endpoint }}
      - NEWT_ID={{ bentopdf_newt_id }}
      - NEWT_SECRET={{ bentopdf_newt_secret }}
networks:
   bentopdf:
     name: bento-pdf

services:
  upsnap:
    image: ghcr.io/seriousm4x/upsnap:5.4.0@sha256:46df3e76907b8d8107a64918a8d7de329d9d1d3aaaa5701ae9f0e0eb869e4170
    container_name: upsnap
    network_mode: host
    restart: always
    cap_add:
      - NET_RAW
    cap_drop:
      - ALL
    volumes:
      - ./data:/app/pb_data
    environment:
      - TZ=America/Toronto

services:
  upsnap:
    image: ghcr.io/seriousm4x/upsnap:5.3.2@sha256:689851f41098d4cdbbf04261a1321d0b0f84f4695fed4ce24d67d0f6c1a275d4
    container_name: upsnap
    network_mode: host
    restart: always
    cap_add:
      - NET_RAW
    cap_drop:
      - ALL
    volumes:
      - ./data:/app/pb_data
    environment:
      - TZ=America/Toronto

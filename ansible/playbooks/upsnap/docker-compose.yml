services:
  upsnap:
    image: ghcr.io/seriousm4x/upsnap:5.3.3@sha256:8ce2936ab6b5124be9005074f4f6801f9f90b21d5fac930d500c4e43eb92cf52
    container_name: upsnap
    network_mode: host
    restart: always
    cap_add:
      - NET_RAW
    cap_drop:
      - ALL
    volumes:
      - ./data:/app/pb_data
    environment:
      - TZ=America/Toronto

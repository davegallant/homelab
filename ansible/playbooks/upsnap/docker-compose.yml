services:
  upsnap:
    image: ghcr.io/seriousm4x/upsnap:5.4.3@sha256:f145fab17aa305dc35801e0d8c8326aaab24913727aa19b74cb9ad6826c0deb2
    container_name: upsnap
    network_mode: host
    restart: always
    cap_add:
      - NET_RAW
    cap_drop:
      - ALL
    volumes:
      - ./data:/app/pb_data
    environment:
      - TZ=America/Toronto

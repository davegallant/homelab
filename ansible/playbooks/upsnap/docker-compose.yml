services:
  upsnap:
    image: ghcr.io/seriousm4x/upsnap:5.3.5@sha256:80884ae345acff00003bc64f379ccd3fbc8cccb8e87dd8987d6691c75437054b
    container_name: upsnap
    network_mode: host
    restart: always
    cap_add:
      - NET_RAW
    cap_drop:
      - ALL
    volumes:
      - ./data:/app/pb_data
    environment:
      - TZ=America/Toronto

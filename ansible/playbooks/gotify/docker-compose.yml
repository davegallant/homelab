services:
  gotify:
    image: docker.io/gotify/server:2.9.1@sha256:a3af47067ce6aad76aadf5ba32d6ddfecd1ae576a961359f039fd1831e8b7652
    container_name: gotify
    networks:
      - gotify
    restart: always
    volumes:
      - ~/data:/app/data
    security_opt:
      - no-new-privileges:true
  newt:
    image: docker.io/fosrl/newt:1.12.5@sha256:3c009663332145cae39b940b07857469038d5e9d71aacb1497e78795ba4e3b9b
    container_name: newt-gotify
    restart: unless-stopped
    networks:
      - gotify
    environment:
      - PANGOLIN_ENDPOINT={{ pangolin_endpoint }}
      - NEWT_ID={{ gotify_newt_id }}
      - NEWT_SECRET={{ gotify_newt_secret }}
networks:
  gotify:
    name: gotify
